name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          cd emergency-scheduling-platform/backend || cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: |
          cd emergency-scheduling-platform/backend || cd backend
          DATABASE_URL=sqlite+pysqlite:// AUTO_SEED_DEFAULTS=false pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        run: |
          cd emergency-scheduling-platform/frontend || cd frontend
          npm ci
          npm run build
